name: Deploy Whiteboard

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🟡 FRONTEND BUILD (DOCKER SAFE - NO npm run build ERROR)
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: whiteboard-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🟢 BACKEND BUILD
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: whiteboard-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deployment Info
        run: |
          echo "🚀 Deploying Whiteboard App"
          echo "Repo: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      # OPTIONAL: Add real deployment here
      # Example: VPS / Render / Docker Hub / Kubernetes

      - name: Deploy complete
        run: echo "✅ Deployment completed successfully!"